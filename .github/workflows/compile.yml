name: autonomous-agent-loop

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backtest-loop:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # 1. Download official MT5 setup executable
      - name: Download MT5 Installer
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile "mt5setup.exe"

      # 2. Extract MT5 silently
      - name: Extract MT5 Compiler Package
        shell: cmd
        run: |
          mt5setup.exe /auto /path:"C:\MT5"
          copy "C:\MT5\metaeditor64.exe" "metaeditor.exe"
          copy "C:\MT5\terminal64.exe" "terminal64.exe"

      # 3. Natively compile using the extracted MetaEditor
      - name: Compile MQL5 Expert Advisor
        shell: cmd
        run: |
          metaeditor.exe /compile:"ExpertAdvisor.mq5" /log:"mql.log" /inc:"."

      # 4. Run Automated Backtest with portable and network bypass flags
      - name: Run Strategy Backtest
        shell: cmd
        run: |
          terminal64.exe /portable /config:"%CD%\backtest.ini"

      # 5. Save the backtest results as a downloadable artifact
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-tester-report
          path: |
            tester_report.html
            mql.log
