name: autonomous-agent-loop

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backtest-loop:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # 1. Download official full live MT5 installer setup executable
      - name: Download MT5 Installer
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile "mt5setup.exe"

      # 2. Extract MT5 directly to the runner workspace directory
      - name: Extract Live Platform Architecture
        shell: cmd
        run: |
          mt5setup.exe /auto /path:"%CD%\mt5_terminal"
          copy "%CD%\mt5_terminal\metaeditor64.exe" "metaeditor.exe"
          copy "%CD%\mt5_terminal\terminal64.exe" "terminal.exe"

      # 3. Create the standard sandbox folder structure MetaTrader expects
      - name: Initialize MT5 Directory Structure
        shell: cmd
        run: |
          mkdir "%CD%\mt5_terminal\MQL5\Experts"
          mkdir "%CD%\mt5_terminal\MQL5\Include"

      # 4. Natively compile using the freshly extracted MetaEditor
      - name: Compile MQL5 Expert Advisor
        shell: cmd
        run: |
          metaeditor.exe /compile:"ExpertAdvisor.mq5" /log:"mql.log" /inc:"."
          if exist "ExpertAdvisor.ex5" copy "ExpertAdvisor.ex5" "%CD%\mt5_terminal\MQL5\Experts\"

      # 5. Run Automated Strategy Test in containerized sandbox mode
      - name: Run Strategy Backtest
        shell: cmd
        run: |
          terminal.exe /portable /config:"%CD%\backtest.ini"

      # 6. Export structural backtest reports and log data
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-tester-report
          path: |
            tester_report.html
            mql.log
