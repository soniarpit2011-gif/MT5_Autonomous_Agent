name: autonomous-agent-loop

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backtest-loop:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # 1. Download official pristine terminal structural binaries zip file 
      - name: Download Raw MT5 Binaries
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://c.mql5.com/3/151/terminal64.zip" -OutFile "terminal64.zip"

      # 2. Extract portable binaries natively using Windows tar tool
      - name: Unpack Portable Platform Architecture
        shell: cmd
        run: |
          tar -xf terminal64.zip
          copy "metaeditor64.exe" "metaeditor.exe"
          copy "terminal64.exe" "terminal.exe"

      # 3. Natively compile using the extracted standalone MetaEditor 
      - name: Compile MQL5 Expert Advisor
        shell: cmd
        run: |
          metaeditor.exe /compile:"ExpertAdvisor.mq5" /log:"mql.log" /inc:"."

      # 4. Run Automated Strategy Test in complete portable sandbox isolated mode
      - name: Run Strategy Backtest
        shell: cmd
        run: |
          terminal.exe /portable /config:"%CD%\backtest.ini"

      # 5. Extract structural backtest outputs
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-tester-report
          path: |
            tester_report.html
            mql.log
