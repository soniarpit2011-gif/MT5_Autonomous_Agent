name: compile

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Compile MQL5 Code
        uses: wunderas/mql-compile-action@v1
        with:
          file: 'ExpertAdvisor.mq5'
          include: '.'
