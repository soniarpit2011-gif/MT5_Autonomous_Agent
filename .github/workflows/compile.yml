name: compile

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # DOWNLOAD THE COMPILER DIRECTLY INTO THE WORKSPACE ROOT
      - name: Download MetaEditor Compiler
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/metaeditor64.exe" -OutFile "metaeditor64.exe"
          if (Test-Path "metaeditor64.exe") { Write-Output "MetaEditor downloaded successfully." }

      - name: Set up and Compile MQL5
        uses: fx31337/mql-compile-action@v2
        with:
          path: ExpertAdvisor.mq5
          mt-path: .
          verbose: true
          init-platform: false
          path-ignore: '**/*.mqh'
          ignore-warnings: false
          log-file: mql.log
          syntax-only: false
